<!DOCTYPE html>
<html lang="en">
    <style>
        div.inline {
            color: black;
            float: left;
            padding: 5px 5px;
            text-decoration: none;
            display: inline-block;
        }

        div.inline a.active {
            background-color: #FBD603;
            border: 1px solid darkred;
        }
    </style>
    <head>
        <meta charset="UTF-8">
        <title>Candidates with pagination</title>
        <meta charset="UTF-8">
        <title>Candidates</title>
        <link
                href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
                rel="stylesheet"
                integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
                crossorigin="anonymous">
        <script
                src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
                integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
                crossorigin="anonymous"></script>
        <meta name="viewport" content="width=device-width, initial-scale=1">
    </head>
    <body>
    <h1 class="text-center" style="padding: 20px 0">LIST CANDIDATES</h1>
    <div class="text-center" >
        <input class="border px-2 py-1" type="search" placeholder="Tìm kiếm">
        <button class="border-0 px-5 py-1">Tìm</button>
    </div>
    <table class="table table-hover">
        <thead>
        </thead>
        <tbody>
        <tr th:each="candidate, iStat : ${candidatePage.content}"
            th:style="${iStat.odd}? 'font-weight: bold;'"
            th:alt-title="${iStat.even}? 'even' : 'odd'">
            <td th:text="${candidate.id}"></td>
            <td th:text="${candidate.fullName}"></td>
            <td th:text="${candidate.dob}"></td>
            <td th:text="${candidate.address}"></td>
            <td th:text="${candidate.phone}"></td>
            <td th:text="${candidate.email}"></td>
            <td><a th:href="@{/edit/{id}(id=${candidate.id})}">Edit</a></td>
            <td><a th:href="@{/delete/{id}(id=${candidate.id})}">Delete</a></td>
        </tr>
        </tbody>
    </table>
    <div class="inline" th:if="${candidatePage.totalPages > 0}" th:each="pageNumber : ${pageNumbers}">
        <a th:href="@{/candidates(size=${candidatePage.size}, page=${pageNumber})}"
           th:text="${pageNumber}"
           th:class="${pageNumber==candidatePage.number + 1} ? active"></a>
    </div>
    <br/> <br><br>
    <div class="d-flex gap-4">
        <a class="btn btn-primary" th:href="@{/add-candidate}">Add Candidate</a>
        <a class="btn btn-secondary" th:href="@{/}">Back</a>
    </div>
    </body>
</html>
